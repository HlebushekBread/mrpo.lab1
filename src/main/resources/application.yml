spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

jwt:
  secret: ${JWT_SECRET}
  lifetime: 1800000

s3:
  url: ${S3_URL}
  access-key: ${S3_ACCESS_KEY}
  secret-key: ${S3_SECRET_KEY}
  bucket: ${S3_BUCKET}